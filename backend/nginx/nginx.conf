# ACV Proxy — Nginx TLS termination for the ACVP platform.
#
# ACVP spec §6 describes a protocol layering where a "proxy server" handles
# TLS; §7 RECOMMENDs TLS 1.2+; §7.1 allows mTLS ("TLS mutual certificate
# authentication").  This config implements all three.

server {
    listen 8443 ssl;
    server_name localhost acvp-server;

    # ── TLS 1.2+ (ACVP spec §7 RECOMMENDED) ──────────────────────────────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── mTLS (ACVP spec §7.1) ────────────────────────────────────────────
    # "optional" lets exempt paths (/health) be reached without a cert.
    # The backend MTLSMiddleware enforces the policy per-path.
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client      optional;

    location / {
        proxy_pass http://acvp-backend:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward mTLS verification result to the backend middleware.
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Client-DN     $ssl_client_s_dn;
    }
}

# HTTP → HTTPS redirect
server {
    listen 8080;
    server_name localhost acvp-server;
    return 301 https://$host:8443$request_uri;
}
