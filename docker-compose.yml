services:
  # FastAPI backend + the NIST GenVal engine (Orleans silo + runner) in one
  # container, all on localhost — see backend/Dockerfile for why. Set
  # USE_NIST_GENVAL=false to run the fixture stub (no engine) instead.
  backend:
    build:
      context: ./backend
      target: backend
    # SECURITY: Do NOT expose port 8000 to the host. The backend is only
    # reachable via the Docker internal network through the Nginx proxy.
    # This prevents attackers from bypassing TLS/mTLS by connecting directly.
    expose:
      - "8000"
    environment:
      - JWT_SECRET=change-me-dev-only
      - DEMO_PASSWORD=acvp-demo
      - FIXTURES_DIR_OVERRIDE=/fixtures
      - USE_NIST_GENVAL=true # grade with the real engine; false = fixture stub
      - MTLS_ENABLED=true
      # Required (fail-closed): set in the shell or a repo-root .env file.
      # Generate: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      - PROXY_SECRET=${PROXY_SECRET:?PROXY_SECRET is required - see docs/mtls-deployment.md}
    volumes:
      - ./tests/fixtures/nist:/fixtures:ro # golden vectors, read-only (fallback + tests)
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)" ]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 60s # the Orleans silo takes ~20-40s to come up first

  # ACV Proxy — Nginx TLS termination + mTLS (ACVP spec §4.2 SHALL, §6, §7).
  proxy:
    build: ./backend/nginx
    ports:
      - "8080:8080"    # HTTP (redirects to HTTPS)
      - "8443:8443"    # HTTPS with mTLS
    environment:
      # Same secret as the backend; injected into nginx.conf.template at start.
      - PROXY_SECRET=${PROXY_SECRET:?PROXY_SECRET is required - see docs/mtls-deployment.md}
    volumes:
      - ./backend/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=https://localhost:8443/acvp/v1
    depends_on:
      proxy:
        condition: service_started
  # Deployment task queue (the prototype runs jobs in-process, so this is optional):
  # redis:
  #   image: redis:7-alpine
  # worker:
  #   build: { context: ./backend, target: backend }
  #   command: arq app.workers.tasks.WorkerSettings
  #   depends_on:
  #     - redis
